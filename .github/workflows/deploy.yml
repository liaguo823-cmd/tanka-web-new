name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build the CURRENT commit as the "v2" build, served at /v2/
      - name: Build new version at /v2
        run: npm run build
        env:
          NODE_ENV: production
          SUB_PATH: /v2

      - name: Stash new build
        run: mv out v2-out

      # Rewind to the explicit "old" commit (last deploy before the
      # icon overhaul) and build it for the root URL.
      - name: Checkout old commit source
        run: |
          git checkout a4f8886 -- app next.config.ts package.json package-lock.json public || true

      - name: Reinstall dependencies for old version (if package-lock changed)
        run: npm ci

      - name: Build old version at root
        run: npm run build
        env:
          NODE_ENV: production

      - name: Merge builds (old at root, new at /v2)
        run: |
          # Old build may include its own /v2/ route (the gemini demo);
          # remove it so the new build doesn't get nested inside.
          rm -rf out/v2
          mv v2-out out/v2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
